<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta
      name="description"
      content="Thank you for applying to the ZAS Tech Internship Program. We will review your application and contact shortlisted candidates."
    />
    <title>Application received — ZAS Tech Internship</title>
    <link rel="icon" href="./assets/logo.JPG" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              zas: {
                black: "#000000",
                night: "#030712",
                deep: "#042f2e",
                panel: "#0f172a",
                muted: "#94a3b8",
                text: "#f8fafc",
              },
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "system-ui", "Segoe UI", "sans-serif"],
              display: ['"Plus Jakarta Sans"', "system-ui", "sans-serif"],
              mono: ['"JetBrains Mono"', "ui-monospace", "Cascadia Mono", "monospace"],
            },
            boxShadow: {
              glow: "0 0 80px rgba(45, 212, 191, 0.22), 0 25px 80px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255,255,255,0.06)",
              glass: "0 8px 40px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.07)",
            },
            backgroundImage: {
              "grid-fade":
                "linear-gradient(to right, rgba(148,163,184,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(148,163,184,0.06) 1px, transparent 1px)",
              "hero-fade":
                "radial-gradient(ellipse 90% 65% at 50% -15%, rgba(4, 47, 46, 0.55) 0%, transparent 52%), radial-gradient(ellipse 70% 50% at 100% 20%, rgba(45, 212, 191, 0.12) 0%, transparent 45%), radial-gradient(ellipse 55% 45% at 0% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 50%)",
            },
          },
        },
      };
    </script>
    <style>
      .zas-glass {
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 23, 42, 0.42);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 0 0 1px rgba(45, 212, 191, 0.04);
      }
      @keyframes success-glow {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      @keyframes success-ring {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.85;
        }
      }
      .animate-success-glow {
        animation: success-glow 3s ease-in-out infinite;
      }
      .animate-success-ring {
        animation: success-ring 4s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .animate-success-glow,
        .animate-success-ring {
          animation: none !important;
        }
      }
      html {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      .font-display {
        letter-spacing: -0.02em;
      }
      .text-gradient-hero {
        background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 40%, #99f6e4 95%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-x-hidden bg-black bg-hero-fade font-sans text-zas-text antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden bg-zas-night">
      <div class="absolute inset-0 bg-black/40"></div>
      <div class="absolute -left-[22%] top-[-12%] h-[560px] w-[560px] rounded-full bg-[#042f2e]/90 blur-[130px]" aria-hidden="true"></div>
      <div
        class="absolute right-[-18%] top-[18%] h-[520px] w-[520px] rounded-full blur-[120px]"
        style="background: rgba(34, 211, 238, 0.14)"
        aria-hidden="true"
      ></div>
      <div class="absolute inset-0 bg-[size:56px_56px] bg-grid-fade opacity-[0.28]" aria-hidden="true"></div>
    </div>

    <header
      class="fixed top-0 inset-x-0 z-50 border-b border-white/[0.06] bg-black/55 backdrop-blur-2xl shadow-[0_12px_48px_rgba(0,0,0,0.35)]"
    >
      <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
        <a class="group flex items-center gap-2 sm:gap-3" href="./index.html#top">
          <span
            class="grid h-9 w-9 shrink-0 place-items-center overflow-hidden rounded-xl border border-teal-400/30 bg-zas-panel/60 sm:h-10 sm:w-10"
          >
            <img class="h-full w-full object-cover" src="./assets/logo.JPG" alt="" width="40" height="40" decoding="async" />
          </span>
          <span class="font-display text-xs font-extrabold tracking-[0.1em] text-white sm:text-sm">ZAS Tech</span>
        </a>
        <a
          class="rounded-full border border-white/12 bg-white/[0.04] px-4 py-2 text-xs font-semibold text-white/90 transition hover:border-teal-400/35 hover:bg-teal-500/10"
          href="./internship.html"
          >Internship</a
        >
      </div>
    </header>

    <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-2xl flex-col items-center justify-center px-4 pb-16 pt-24 sm:px-6">
      <div class="zas-glass relative w-full px-8 py-12 text-center shadow-[0_24px_80px_rgba(0,0,0,0.55)] md:px-12 md:py-14">
        <div class="pointer-events-none absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-teal-400/35 to-transparent" aria-hidden="true"></div>

        <div class="relative mx-auto mb-8 flex h-24 w-24 items-center justify-center">
          <span class="absolute inset-0 rounded-full bg-teal-400/20 blur-2xl animate-success-glow" aria-hidden="true"></span>
          <span class="absolute inset-[-12px] rounded-full border border-teal-400/25 animate-success-ring" aria-hidden="true"></span>
          <span
            class="relative grid h-[4.5rem] w-[4.5rem] place-items-center rounded-full border border-teal-400/35 bg-gradient-to-br from-teal-500/25 to-cyan-600/20 shadow-[0_0_40px_rgba(45,212,191,0.35)]"
          >
            <svg class="h-10 w-10 text-teal-100" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M20 6L9 17l-5-5"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </div>

        <p class="font-mono text-[11px] uppercase tracking-[0.28em] text-teal-400/95">Internship Program</p>
        <h1 class="mt-4 font-display text-2xl font-extrabold tracking-tight text-white sm:text-3xl md:text-4xl">
          Application received
        </h1>
        <p class="mx-auto mt-5 max-w-lg text-base leading-relaxed text-slate-400">
          Thank you for applying to the ZAS Tech Internship Program. Our team will review your application and contact
          shortlisted candidates for the interview stage.
        </p>

        <div class="mt-10 flex flex-col items-stretch gap-3 sm:flex-row sm:justify-center sm:gap-4">
          <a
            class="inline-flex items-center justify-center rounded-full border border-teal-400/55 bg-gradient-to-r from-teal-400 to-cyan-500 px-7 py-3.5 font-semibold text-black shadow-glow transition hover:shadow-[0_0_56px_rgba(45,212,191,0.38)] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-teal-400/35"
            href="./index.html#top"
            >Back to Home</a
          >
          <a
            class="inline-flex items-center justify-center rounded-full border border-white/[0.14] bg-zas-panel/40 px-7 py-3.5 font-semibold text-white transition hover:border-teal-400/45 hover:bg-teal-500/10 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-white/15"
            href="mailto:info@zas-tech.krd"
            >Email us</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
