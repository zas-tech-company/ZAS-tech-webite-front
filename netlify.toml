[build]
  command = "npm run generate:sitemap"
  publish = "."

# Legacy duplicate thank-you page — canonical URL is /thank-you.html
[[redirects]]
  from = "/public/thank-you.html"
  to = "/thank-you.html"
  status = 301

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
