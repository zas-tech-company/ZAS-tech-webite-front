<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="Thank you — ZAS Tech has received your message." data-i18n="thanks.metaDesc" />
    <title data-i18n="thanks.title">Message received — ZAS Tech</title>
    <link rel="icon" href="./assets/logo.JPG" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              zas: {
                black: "#000000",
                night: "#030712",
                deep: "#042f2e",
                panel: "#0f172a",
                muted: "#94a3b8",
                text: "#f8fafc",
              },
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "Segoe UI", "Roboto", "Arial", "sans-serif"],
              display: ["Syne", "Inter", "system-ui", "sans-serif"],
            },
            boxShadow: {
              glow: "0 0 80px rgba(45, 212, 191, 0.22), 0 25px 80px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255,255,255,0.06)",
              glass: "0 8px 40px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.07)",
            },
            backgroundImage: {
              "grid-fade":
                "linear-gradient(to right, rgba(148,163,184,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(148,163,184,0.06) 1px, transparent 1px)",
              "hero-fade":
                "radial-gradient(ellipse 90% 65% at 50% -15%, rgba(4, 47, 46, 0.55) 0%, transparent 52%), radial-gradient(ellipse 70% 50% at 100% 20%, rgba(45, 212, 191, 0.12) 0%, transparent 45%), radial-gradient(ellipse 55% 45% at 0% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 50%)",
            },
          },
        },
      };
    </script>
    <style>
      .zas-glass {
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 23, 42, 0.42);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 0 0 1px rgba(45, 212, 191, 0.04);
      }
      @keyframes success-glow {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      @keyframes success-ring {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.85;
        }
      }
      .animate-success-glow {
        animation: success-glow 3s ease-in-out infinite;
      }
      .animate-success-ring {
        animation: success-ring 4s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .animate-success-glow,
        .animate-success-ring {
          animation: none !important;
        }
      }
      body.zas-rtl {
        font-family: "Noto Sans Arabic", Inter, system-ui, sans-serif;
      }
      body.zas-rtl .font-display {
        font-family: "Noto Sans Arabic", "Syne", Inter, system-ui, sans-serif;
      }
      [data-lang-dropdown-chevron] {
        transition: transform 0.25s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        [data-lang-dropdown-chevron] {
          transition: none;
        }
      }
      [data-lang-dropdown-toggle][aria-expanded="true"] [data-lang-dropdown-chevron] {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body class="relative min-h-screen overflow-x-hidden bg-black bg-hero-fade font-sans text-zas-text antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden bg-zas-night">
      <div class="absolute inset-0 bg-black/40"></div>
      <div
        class="absolute -left-[22%] top-[-12%] h-[560px] w-[560px] rounded-full bg-[#042f2e]/90 blur-[130px]"
        style="animation: pulse-glow-bg 7s ease-in-out infinite"
        aria-hidden="true"
      ></div>
      <div
        class="absolute right-[-18%] top-[18%] h-[520px] w-[520px] rounded-full blur-[120px]"
        style="animation: pulse-glow-bg 7s ease-in-out infinite 1.4s; background: rgba(34, 211, 238, 0.14)"
        aria-hidden="true"
      ></div>
      <div
        class="absolute bottom-[-25%] left-[25%] h-[620px] w-[620px] rounded-full blur-[140px]"
        style="background: rgba(45, 212, 191, 0.09)"
        aria-hidden="true"
      ></div>
      <div class="absolute inset-0 bg-[size:56px_56px] bg-grid-fade opacity-[0.28]" aria-hidden="true"></div>
      <svg class="absolute bottom-0 right-0 w-[min(92vw,760px)] opacity-[0.14]" viewBox="0 0 600 400" fill="none" aria-hidden="true">
        <path d="M40 320C140 220 220 180 320 200C420 220 500 120 580 40" stroke="url(#tg1)" stroke-width="2" />
        <path d="M0 260C120 200 200 240 280 300C360 360 460 320 600 200" stroke="url(#tg1)" stroke-width="1.5" opacity="0.55" />
        <defs>
          <linearGradient id="tg1" x1="0" y1="0" x2="600" y2="400">
            <stop stop-color="#2dd4bf" />
            <stop offset="1" stop-color="#0891b2" stop-opacity="0" />
          </linearGradient>
        </defs>
      </svg>
      <svg class="absolute left-[-6%] top-[10%] h-[min(45vh,420px)] w-[min(45vw,420px)] opacity-[0.18]" viewBox="0 0 400 400" fill="none" aria-hidden="true">
        <ellipse cx="200" cy="200" rx="160" ry="95" stroke="url(#tg2)" stroke-width="1.2" transform="rotate(-18 200 200)" />
        <defs>
          <linearGradient id="tg2" x1="0" y1="0" x2="400" y2="400">
            <stop stop-color="#2dd4bf" stop-opacity="0.9" />
            <stop offset="1" stop-color="#042f2e" stop-opacity="0" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <style>
      @keyframes pulse-glow-bg {
        0%,
        100% {
          opacity: 0.45;
          filter: blur(130px);
        }
        50% {
          opacity: 0.72;
          filter: blur(140px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        [style*="pulse-glow-bg"] {
          animation: none !important;
        }
      }
    </style>

    <header
      class="sticky top-0 z-50 border-b border-white/[0.06] bg-black/35 backdrop-blur-2xl shadow-[0_12px_48px_rgba(0,0,0,0.35)] supports-[backdrop-filter]:bg-black/25"
    >
      <div class="mx-auto flex w-full max-w-6xl items-center justify-between gap-2 px-4 py-3 sm:gap-4 sm:px-6 sm:py-3.5">
        <a class="font-display min-w-0 truncate text-xs font-extrabold tracking-[0.1em] text-white sm:text-sm sm:tracking-[0.12em]" href="./index.html#top">ZAS Tech</a>
        <div class="relative shrink-0" data-lang-dropdown>
          <button
            type="button"
            id="zas-lang-trigger-thanks"
            data-lang-dropdown-toggle
            data-i18n-aria="lang.label"
            aria-expanded="false"
            aria-haspopup="listbox"
            aria-controls="zas-lang-menu-thanks"
            class="inline-flex min-h-9 max-w-[min(44vw,11rem)] items-center gap-1 rounded-lg border border-white/[0.1] bg-zas-panel/55 px-2 py-1.5 text-[10px] font-semibold leading-none text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.06)] backdrop-blur-xl transition duration-300 hover:border-teal-400/35 hover:bg-teal-500/10 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-400/45 aria-expanded:border-teal-400/40 aria-expanded:bg-teal-500/12 aria-expanded:shadow-[0_0_28px_rgba(45,212,191,0.15)] sm:min-h-[2.75rem] sm:max-w-none sm:gap-2 sm:rounded-xl sm:px-3 sm:py-2 sm:text-xs"
          >
            <span class="min-w-0 flex-1 truncate text-start" data-lang-current>English</span>
            <svg
              class="h-3.5 w-3.5 shrink-0 text-white/75 sm:h-4 sm:w-4"
              viewBox="0 0 20 20"
              fill="currentColor"
              aria-hidden="true"
              data-lang-dropdown-chevron
            >
              <path
                fill-rule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <div
            id="zas-lang-menu-thanks"
            data-lang-dropdown-panel
            hidden
            role="listbox"
            aria-labelledby="zas-lang-trigger-thanks"
            class="absolute end-0 top-full z-[70] mt-2 min-w-[12rem] overflow-hidden rounded-xl border border-white/[0.1] bg-zas-panel/[0.97] py-1 shadow-[0_20px_60px_rgba(0,0,0,0.65)] backdrop-blur-2xl"
          >
            <button
              type="button"
              role="option"
              data-lang-btn="en"
              data-i18n="lang.en"
              aria-pressed="false"
              class="flex w-full items-center gap-2 border-s-2 border-transparent px-4 py-2.5 text-start text-sm font-medium text-white/90 transition hover:bg-white/[0.06] focus-visible:bg-white/[0.06] focus-visible:outline-none aria-[pressed=true]:border-teal-400 aria-[pressed=true]:bg-teal-500/15 aria-[pressed=true]:text-teal-50"
            >
              English
            </button>
            <button
              type="button"
              role="option"
              data-lang-btn="ku"
              data-i18n="lang.ku"
              aria-pressed="false"
              class="flex w-full items-center gap-2 border-s-2 border-transparent px-4 py-2.5 text-start text-sm font-medium text-white/90 transition hover:bg-white/[0.06] focus-visible:bg-white/[0.06] focus-visible:outline-none aria-[pressed=true]:border-teal-400 aria-[pressed=true]:bg-teal-500/15 aria-[pressed=true]:text-teal-50"
            >
              Kurdish
            </button>
            <button
              type="button"
              role="option"
              data-lang-btn="ar"
              data-i18n="lang.ar"
              aria-pressed="false"
              class="flex w-full items-center gap-2 border-s-2 border-transparent px-4 py-2.5 text-start text-sm font-medium text-white/90 transition hover:bg-white/[0.06] focus-visible:bg-white/[0.06] focus-visible:outline-none aria-[pressed=true]:border-teal-400 aria-[pressed=true]:bg-teal-500/15 aria-[pressed=true]:text-teal-50"
            >
              Arabic
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="relative z-10 mx-auto flex min-h-[calc(100vh-4rem)] w-full max-w-lg flex-col items-center justify-center px-6 py-16 text-center md:max-w-xl">
      <div class="zas-glass relative w-full px-8 py-12 shadow-[0_24px_80px_rgba(0,0,0,0.55)] md:px-12 md:py-14">
        <div class="pointer-events-none absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-teal-400/35 to-transparent" aria-hidden="true"></div>

        <div class="relative mx-auto mb-8 flex h-24 w-24 items-center justify-center">
          <span class="absolute inset-0 rounded-full bg-teal-400/20 blur-2xl animate-success-glow" aria-hidden="true"></span>
          <span class="absolute inset-[-12px] rounded-full border border-teal-400/25 animate-success-ring" aria-hidden="true"></span>
          <span
            class="absolute inset-[-20px] rounded-full border border-cyan-400/15 opacity-70 animate-success-ring"
            style="animation-delay: 0.6s"
            aria-hidden="true"
          ></span>
          <span
            class="relative grid h-[4.5rem] w-[4.5rem] place-items-center rounded-full border border-teal-400/35 bg-gradient-to-br from-teal-500/25 to-cyan-600/20 shadow-[0_0_40px_rgba(45,212,191,0.35)]"
          >
            <svg class="h-10 w-10 text-teal-100 drop-shadow-[0_0_12px_rgba(45,212,191,0.9)]" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M20 6L9 17l-5-5"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
        </div>

        <p class="font-mono text-[11px] uppercase tracking-[0.28em] text-teal-400/95">ZAS Tech</p>
        <h1 class="mt-4 font-display text-3xl font-extrabold tracking-tight text-white md:text-4xl" data-i18n="thanks.h1">Message received</h1>
        <p class="mx-auto mt-4 max-w-md text-base leading-relaxed text-zas-muted" data-i18n="thanks.p">We’ll respond with clear next steps.</p>

        <div class="mt-10 flex flex-col items-stretch gap-3 sm:flex-row sm:flex-wrap sm:justify-center sm:gap-4">
          <a
            class="inline-flex items-center justify-center rounded-full border border-teal-400/55 bg-gradient-to-r from-teal-400 to-cyan-500 px-7 py-3.5 font-semibold text-black shadow-glow transition duration-300 hover:border-teal-300 hover:shadow-[0_0_56px_rgba(45,212,191,0.38)] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-teal-400/35"
            href="./index.html#top"
            data-i18n="thanks.home"
            >Back to Home</a
          >
          <a
            class="inline-flex items-center justify-center rounded-full border border-white/[0.14] bg-zas-panel/40 px-7 py-3.5 font-semibold text-white shadow-glass backdrop-blur-xl transition duration-300 hover:border-teal-400/45 hover:bg-teal-500/10 hover:shadow-[0_0_40px_rgba(45,212,191,0.12)] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-white/15"
            href="mailto:info@zas-tech.krd"
            data-i18n="thanks.email"
            >Email Directly</a
          >
        </div>
      </div>
    </main>
    <script src="./static/i18n.js" defer></script>
  </body>
</html>
